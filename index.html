atmap · Monat × Jahr\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx-4);flex-shrink:0\"\u003e\n            \u003cspan style=\"font-family:var(--ff-mono)\"\u003ekalt\u003c/span\u003e\n            \u003cspan style=\"display:inline-block;width:96px;height:6px;border-radius:3px;\n              background:linear-gradient(to right,#1d4ed8,#60a5fa,#bfdbfe,#fef9e7,#fde68a,#fb923c,#dc2626)\"\u003e\u003c/span\u003e\n            \u003cspan style=\"font-family:var(--ff-mono)\"\u003ewarm\u003c/span\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv id=\"chart-heatmap\" style=\"width:100%;height:480px\"\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003c!-- Deviation chart --\u003e\n      \u003cdiv class=\"chart-card fu fu2\" style=\"padding:24px\"\u003e\n        \u003cdiv class=\"head\"\u003e\n          \u003cdiv\u003e\n            \u003cdiv class=\"t\"\u003eTemperaturabweichung vom Referenzmittel\u003c/div\u003e\n            \u003cdiv id=\"dev-sub\" style=\"font-size:12px;color:var(--tx-3);font-family:var(--ff-mono);margin-top:3px\"\u003eWarming Stripes · Basis 1961–1990\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx-3);flex-shrink:0\"\u003e\n            \u003cspan style=\"display:inline-block;width:80px;height:8px;border-radius:4px;\n              background:linear-gradient(to right,#1d4ed8,#60a5fa,#bfdbfe,#fef3c7,#fb923c,#dc2626)\"\u003e\u003c/span\u003e\n            kälter → wärmer\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv id=\"chart-deviation\" style=\"width:100%;height:240px\"\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\u003c/main\u003e\n\n\u003cfooter class=\"site-footer\"\u003e\n  \u003cspan id=\"footer-city\"\u003eWÜRZBURG · WETTER \u0026amp; KLIMAANALYSE · FWMP 2026\u003c/span\u003e\n  \u003cspan id=\"footer-source\"\u003eVorhersage: Bright Sky / DWD MOSMIX · Klimadaten: DWD\u003c/span\u003e\n\u003c/footer\u003e\n\n\n\u003c!-- ═══════════════════════════════\n     JAVASCRIPT\n═══════════════════════════════ --\u003e\n\u003cscript\u003e\nconst API = \u0027http://localhost:8000\u0027;\n\n/* ══════════════════════════════════\n   GEO STATE\n══════════════════════════════════ */\nlet geoLat  = 49.7913;\nlet geoLon  = 9.9534;\nlet geoCity = \u0027Würzburg\u0027;\n\n/* ── Weather day state ── */\nlet allByDay = {};\nlet allDayKeys = [];\nlet weatherIsDemo = false;\n\n/* Schnellauswahl-Städte */\nconst PRESETS = [\n  {name:\u0027Würzburg\u0027,  lat:49.7913, lon: 9.9534},\n  {name:\u0027München\u0027,   lat:48.1351, lon:11.5820},\n  {name:\u0027Nürnberg\u0027,  lat:49.4521, lon:11.0767},\n  {name:\u0027Frankfurt\u0027, lat:50.1109, lon: 8.6821},\n  {name:\u0027Berlin\u0027,    lat:52.5200, lon:13.4050},\n  {name:\u0027Hamburg\u0027,   lat:53.5753, lon:10.0153},\n  {name:\u0027Köln\u0027,      lat:50.9333, lon: 6.9500},\n  {name:\u0027Stuttgart\u0027, lat:48.7758, lon: 9.1829},\n];\n\n/* ══════════════════════════════════\n   CITY PICKER\n══════════════════════════════════ */\n(function initCityPicker(){\n  const wrap   = document.getElementById(\u0027city-wrap\u0027);\n  const btn    = document.getElementById(\u0027hdr-city-btn\u0027);\n  const picker = document.getElementById(\u0027city-picker\u0027);\n  const input  = document.getElementById(\u0027cp-input\u0027);\n  const psets  = document.getElementById(\u0027cp-presets\u0027);\n  const results= document.getElementById(\u0027cp-results\u0027);\n\n  /* Preset-Chips rendern */\n  psets.innerHTML = PRESETS.map(p =\u003e\n    `\u003cbutton class=\"cp-preset${p.name===geoCity?\u0027 active\u0027:\u0027\u0027}\"\n       onclick=\"selectCity(\u0027${p.name}\u0027,${p.lat},${p.lon})\"\u003e${p.name}\u003c/button\u003e`\n  ).join(\u0027\u0027);\n\n  /* Öffnen / Schließen */\n  btn.addEventListener(\u0027click\u0027, e=\u003e{\n    e.stopPropagation();\n    const opening = !wrap.classList.contains(\u0027open\u0027);\n    wrap.classList.toggle(\u0027open\u0027);\n    if(opening){ setTimeout(()=\u003einput.focus(),30); }\n  });\n  picker.addEventListener(\u0027click\u0027, e=\u003ee.stopPropagation());\n  document.addEventListener(\u0027click\u0027, ()=\u003eclosePicker());\n\n  function closePicker(){\n    wrap.classList.remove(\u0027open\u0027);\n    input.value=\u0027\u0027;\n    results.innerHTML=\u0027\u0027;\n  }\n  window._closePicker = closePicker;\n\n  /* Nominatim-Suche mit Debounce */\n  let timer;\n  input.addEventListener(\u0027input\u0027, ()=\u003e{\n    clearTimeout(timer);\n    const q = input.value.trim();\n    if(q.length \u003c 2){ results.innerHTML=\u0027\u0027; return; }\n    results.innerHTML=\u0027\u003cdiv class=\"cp-loading\"\u003eSuche…\u003c/div\u003e\u0027;\n    timer = setTimeout(()=\u003esearchCity(q), 420);\n  });\n  input.addEventListener(\u0027keydown\u0027, e=\u003e{\n    if(e.key===\u0027Escape\u0027) closePicker();\n  });\n\n  async function searchCity(q){\n    try{\n      const url = `https://nominatim.openstreetmap.org/search`\n        + `?q=${encodeURIComponent(q)}\u0026format=json\u0026limit=6\u0026addressdetails=1\u0026accept-language=de`;\n      const resp = await fetch(url, {headers:{\u0027User-Agent\u0027:\u0027WuerzDashboard/1.0\u0027}});\n      const data = await resp.json();\n      if(!data.length){\n        results.innerHTML=\u0027\u003cdiv class=\"cp-empty\"\u003eKeine Ergebnisse\u003c/div\u003e\u0027;\n        return;\n      }\n      results.innerHTML = data.map(r=\u003e{\n        const name = r.name || r.display_name.split(\u0027,\u0027)[0];\n        const addr = r.address || {};\n        const sub  = [addr.state||addr.county, addr.country]\n                       .filter(Boolean).join(\u0027 · \u0027);\n        const lat  = parseFloat(r.lat).toFixed(4);\n        const lon  = parseFloat(r.lon).toFixed(4);\n        return `\u003cbutton class=\"cp-item\"\n          onclick=\"selectCity(\u0027${esc(name)}\u0027,${lat},${lon})\"\u003e\n          \u003cdiv class=\"cp-name\"\u003e${name}\u003c/div\u003e\n          \u003cdiv class=\"cp-sub\"\u003e${sub||r.display_name.split(\u0027,\u0027).slice(1,3).join(\u0027,\u0027).trim()}\u003c/div\u003e\n        \u003c/button\u003e`;\n      }).join(\u0027\u0027);\n    }catch(err){\n      results.innerHTML=\u0027\u003cdiv class=\"cp-empty\"\u003eFehler bei der Suche\u003c/div\u003e\u0027;\n    }\n  }\n\n  function esc(s){ return s.replace(/\u0027/g,\"\\\\\\\\\\\\\\\\\u0027\").replace(/\"/g,\u0027\u0026quot;\u0027); }\n})();\n\n/* Städte-Auswahl anwenden */\nfunction selectCity(name, lat, lon){\n  geoCity = name;\n  geoLat  = +lat;\n  geoLon  = +lon;\n\n  /* Header aktualisieren */\n  document.getElementById(\u0027city-name\u0027).textContent = name;\n\n  /* Preset-Chips aktualisieren */\n  document.querySelectorAll(\u0027.cp-preset\u0027).forEach(b=\u003e{\n    b.classList.toggle(\u0027active\u0027, b.textContent===name);\n  });\n\n  /* Footer */\n  const fc=document.getElementById(\u0027footer-city\u0027);\n  if(fc) fc.textContent=`${name.toUpperCase()} · WETTER \u0026 KLIMAANALYSE · FWMP 2026`;\n\n  /* Klimatitel zurücksetzen bis neue Daten geladen */\n  const ct=document.getElementById(\u0027climate-title\u0027);\n  if(ct) ct.textContent=`Historische Klimaanalyse – lädt…`;\n\n  /* Picker schließen */\n  if(window._closePicker) window._closePicker();\n\n  /* Daten neu laden */\n  loadWeather();\n  loadClimate();\n}\n\n/* ── Clock ── */\n(function clock(){\n  function tick(){\n    const n=new Date();\n    const c=document.getElementById(\u0027hdr-clock\u0027);\n    const d=document.getElementById(\u0027hdr-date\u0027);\n    if(c) c.textContent=n.toLocaleTimeString(\u0027de-DE\u0027,{hour:\u00272-digit\u0027,minute:\u00272-digit\u0027,second:\u00272-digit\u0027})+\u0027 Uhr\u0027;\n    if(d) d.textContent=n.toLocaleDateString(\u0027de-DE\u0027,{weekday:\u0027long\u0027,day:\u0027numeric\u0027,month:\u0027long\u0027});\n  }\n  tick(); setInterval(tick,1000);\n})();\n\n/* ── Status ── */\nfunction setStatus(state){\n  const el=document.getElementById(\u0027status-chip\u0027);\n  el.className=\u0027chip\u0027;\n  if(state===\u0027online\u0027){el.classList.add(\u0027chip-online\u0027);el.textContent=\u0027● Online · DWD\u0027}\n  else if(state===\u0027offline\u0027){el.classList.add(\u0027chip-offline\u0027);el.textContent=\u0027● Offline · Demo\u0027}\n  else{el.textContent=\u0027● Verbinde…\u0027}\n}\n\n/* ── Tab switch ── */\nfunction switchTab(tab){\n  [\u0027forecast\u0027,\u0027map\u0027,\u0027climate\u0027].forEach(t=\u003e{\n    document.getElementById(\u0027tab-\u0027+t).classList.toggle(\u0027on\u0027,t===tab);\n    document.getElementById(\u0027section-\u0027+t).classList.toggle(\u0027active\u0027,t===tab);\n  });\n  if(tab===\u0027map\u0027){\n    if(!mapReady) loadMapWeather();\n    else setTimeout(()=\u003emapInst\u0026\u0026mapInst.resize(),60);\n  }\n  setTimeout(()=\u003e[cTemp,cPrecip,cWind,cTrend,cDev,cHeat].forEach(c=\u003ec\u0026\u0026c.resize()),60);\n}\n\n/* ══════════════════════════════════\n   TEMPERATURKARTE\n══════════════════════════════════ */\nlet mapInst = null;\nlet mapReady = false;\n\n// Temperatur → Farbe (gleiche Skala wie Heatmap)\nconst TEMP_COLORS = [\n  [-10,\u0027#1a3a6b\u0027],[0,\u0027#1d4ed8\u0027],[8,\u0027#60a5fa\u0027],\n  [14,\u0027#bfdbfe\u0027],[18,\u0027#fde68a\u0027],[23,\u0027#fb923c\u0027],[28,\u0027#dc2626\u0027]\n];\nfunction tempToColor(t){\n  if(t==null)return\u0027#4A4A52\u0027;\n  const stops=TEMP_COLORS;\n  if(t\u003c=stops[0][0])return stops[0][1];\n  if(t\u003e=stops[stops.length-1][0])return stops[stops.length-1][1];\n  for(let i=0;i\u003cstops.length-1;i++){\n    const[t0,c0]=stops[i],[t1,c1]=stops[i+1];\n    if(t\u003e=t0\u0026\u0026t\u003c=t1){\n      const r=t-t0,d=t1-t0,p=r/d;\n      const hex2rgb=h=\u003e[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];\n      const [r0,g0,b0]=hex2rgb(c0),[r1,g1,b1]=hex2rgb(c1);\n      const lerp=(a,b)=\u003eMath.round(a+(b-a)*p);\n      const toHex=n=\u003en.toString(16).padStart(2,\u00270\u0027);\n      return`#${toHex(lerp(r0,r1))}${toHex(lerp(g0,g1))}${toHex(lerp(b0,b1))}`;\n    }\n  }\n  return\u0027#4A4A52\u0027;\n}\n\nfunction windDirArrow(deg){\n  if(deg==null)return\u0027\u0027;\n  return [\u0027↑\u0027,\u0027↗\u0027,\u0027→\u0027,\u0027↘\u0027,\u0027↓\u0027,\u0027↙\u0027,\u0027←\u0027,\u0027↖\u0027][Math.round(deg/45)%8];\n}\n\nasync function loadMapWeather(){\n  try{\n    // MapLibre dynamisch laden (CDN nicht im Bundle-HTML)\n    if(!window.maplibregl){\n      await new Promise((res,rej)=\u003e{\n        const s=document.createElement(\u0027script\u0027);\n        s.src=\u0027https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js\u0027;\n        s.onload=res; s.onerror=rej;\n        document.head.appendChild(s);\n      });\n      const l=document.createElement(\u0027link\u0027);\n      l.rel=\u0027stylesheet\u0027;\n      l.href=\u0027https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css\u0027;\n      document.head.appendChild(l);\n    }\n\n    // Karte initialisieren\n    mapInst = new maplibregl.Map({\n      container:\u0027map-container\u0027,\n      style:\u0027https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json\u0027,\n      center:[10.45, 51.2],\n      zoom:5.4,\n      minZoom:4, maxZoom:10,\n    });\n\n    mapInst.on(\u0027load\u0027,async()=\u003e{\n      mapReady=true;\n      try{\n        const r=await fetch(`${API}/map-weather`,{signal:AbortSignal.timeout(20000)});\n        if(!r.ok)throw new Error(`HTTP ${r.status}`);\n        const data=await r.json();\n        renderMapStations(data);\n      }catch(e){\n        console.error(\u0027[Map] API:\u0027,e.message);\n        document.getElementById(\u0027map-timestamp\u0027).textContent=\u0027Verbindung fehlgeschlagen\u0027;\n      }\n    });\n\n    mapInst.addControl(new maplibregl.NavigationControl({showCompass:false}),\u0027top-right\u0027);\n\n  }catch(e){\n    console.error(\u0027[Map] Init:\u0027,e);\n  }\n}\n\nfunction renderMapStations(data){\n  const stations=data.stations||[];\n  const valid=stations.filter(s=\u003es.temperature!=null);\n\n  // Stats-Banner\n  document.getElementById(\u0027map-count\u0027).textContent=`${valid.length}`;\n  if(valid.length){\n    const temps=valid.map(s=\u003es.temperature);\n    const avg=(temps.reduce((a,b)=\u003ea+b,0)/temps.length).toFixed(1);\n    const mn=Math.min(...temps).toFixed(1), mx=Math.max(...temps).toFixed(1);\n    document.getElementById(\u0027map-avg\u0027).textContent=`${avg}°C`;\n    document.getElementById(\u0027map-minmax\u0027).textContent=`${mn}° · ${mx}°`;\n  }\n  const ts=new Date();\n  document.getElementById(\u0027map-timestamp\u0027).textContent=\n    `Stand: ${ts.toLocaleTimeString(\u0027de-DE\u0027,{hour:\u00272-digit\u0027,minute:\u00272-digit\u0027})} Uhr · Cache 30 min`;\n\n  // Marker auf Karte\n  stations.forEach(s=\u003e{\n    if(s.temperature==null)return;\n    const color=tempToColor(s.temperature);\n    const el=document.createElement(\u0027div\u0027);\n    el.style.cssText=`\n      width:44px;height:44px;\n      display:flex;flex-direction:column;align-items:center;justify-content:center;\n      cursor:pointer;\n    `;\n    // Kreis\n    const circle=document.createElement(\u0027div\u0027);\n    circle.style.cssText=`\n      width:36px;height:36px;border-radius:50%;\n      background:${color};\n      border:1.5px solid rgba(255,255,255,.25);\n      display:flex;align-items:center;justify-content:center;\n      font:600 11px/1 var(--ff-mono,\u0027JetBrains Mono\u0027,monospace);\n      color:#fff;\n      box-shadow:0 2px 8px rgba(0,0,0,.5);\n      transition:transform .15s;\n    `;\n    circle.textContent=`${Math.round(s.temperature)}°`;\n    el.appendChild(circle);\n\n    // Tooltip als Popup (kein verschachteltes Template-Literal)\n    const windInfo = s.wind_speed!=null\n      ? windDirArrow(s.wind_direction)+\u0027 \u0027+Math.round(s.wind_speed)+\u0027 km/h\u0027 : \u0027\u0027;\n    const condInfo = s.condition ? \u0027 · \u0027+s.condition : \u0027\u0027;\n    const popup=new maplibregl.Popup({\n      offset:24,closeButton:false,closeOnClick:false,\n      className:\u0027temp-popup\u0027\n    }).setHTML(\n      \u0027\u003cdiv style=\"font-size:13px;font-weight:600;margin-bottom:4px\"\u003e\u0027+s.name+\u0027\u003c/div\u003e\u0027+\n      \u0027\u003cdiv style=\"font-size:22px;font-weight:600;letter-spacing:-.02em;color:\u0027+color+\u0027\"\u003e\u0027+\n        s.temperature.toFixed(1)+\u0027°C\u003c/div\u003e\u0027+\n      \u0027\u003cdiv style=\"font-size:11px;color:var(--tx-3);margin-top:4px;font-family:monospace\"\u003e\u0027+\n        windInfo+condInfo+\u0027\u003c/div\u003e\u0027\n    );\n\n    el.addEventListener(\u0027mouseenter\u0027,()=\u003e{\n      circle.style.transform=\u0027scale(1.2)\u0027;\n      popup.addTo(mapInst);\n    });\n    el.addEventListener(\u0027mouseleave\u0027,()=\u003e{\n      circle.style.transform=\u0027scale(1)\u0027;\n      popup.remove();\n    });\n\n    // Click → Stadt als aktiven Standort setzen\n    el.addEventListener(\u0027click\u0027,()=\u003e{\n      selectCity(s.name,s.lat,s.lon);\n      switchTab(\u0027forecast\u0027);\n    });\n\n    new maplibregl.Marker({element:el})\n      .setLngLat([s.lon,s.lat])\n      .setPopup(popup)\n      .addTo(mapInst);\n  });\n}\n\n/* ── Icon helper — two-tone monochrome, matches Design Guide ── */\nfunction weatherIcon(iconName, sz=40){\n  const ic=iconName||\u0027\u0027;\n  // thunder\n  if(ic.includes(\u0027thunder\u0027))\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003cpath class=\"ic-bg\" d=\"M14 30a8 8 0 0 1 1.2-15.9 11 11 0 0 1 21.3 3.4A7 7 0 0 1 35 31H14Z\"/\u003e\n      \u003cpath class=\"ic-fg\" d=\"M25 18 19 28h5l-2 8 7-11h-5l1-7Z\"/\u003e\n    \u003c/svg\u003e`;\n  // snow\n  if(ic.includes(\u0027snow\u0027)||ic.includes(\u0027sleet\u0027))\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003cpath class=\"ic-bg\" d=\"M14 30a8 8 0 0 1 1.2-15.9 11 11 0 0 1 21.3 3.4A7 7 0 0 1 35 31H14Z\"/\u003e\n      \u003ccircle class=\"ic-fg\" cx=\"18\" cy=\"38\" r=\"1.8\"/\u003e\n      \u003ccircle class=\"ic-fg\" cx=\"24\" cy=\"40\" r=\"1.8\"/\u003e\n      \u003ccircle class=\"ic-fg\" cx=\"30\" cy=\"38\" r=\"1.8\"/\u003e\n    \u003c/svg\u003e`;\n  // rain / drizzle\n  if(ic.includes(\u0027rain\u0027)||ic.includes(\u0027drizzle\u0027))\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003cpath class=\"ic-bg\" d=\"M14 30a8 8 0 0 1 1.2-15.9 11 11 0 0 1 21.3 3.4A7 7 0 0 1 35 31H14Z\"/\u003e\n      \u003cpath d=\"M20 34v6M26 34v6M32 34v6\" stroke=\"var(--ic-fg)\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\"/\u003e\n    \u003c/svg\u003e`;\n  // fog\n  if(ic.includes(\u0027fog\u0027))\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003cpath d=\"M8 20h32M10 26h28M12 32h24\" stroke=\"var(--ic-bg)\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\"/\u003e\n    \u003c/svg\u003e`;\n  // night clear\n  if(ic.includes(\u0027night\u0027)\u0026\u0026!ic.includes(\u0027cloud\u0027))\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003ccircle class=\"ic-bg\" cx=\"24\" cy=\"24\" r=\"14\"/\u003e\n      \u003cpath class=\"ic-fg\" d=\"M28 10a14 14 0 0 0 0 28 14 14 0 0 1 0-28Z\"/\u003e\n    \u003c/svg\u003e`;\n  // night partly cloudy\n  if(ic.includes(\u0027night\u0027)\u0026\u0026ic.includes(\u0027cloud\u0027))\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003cpath class=\"ic-bg\" d=\"M26 12c-3 0-6 2-7 5a8 8 0 0 0 7 11 9 9 0 0 0 0-18 6 6 0 0 1 0 2Z\"/\u003e\n      \u003cpath class=\"ic-fg\" d=\"M14 36a7 7 0 0 1 1-13 9 9 0 0 1 17 2 5 5 0 0 1-1 11H14Z\"/\u003e\n    \u003c/svg\u003e`;\n  // overcast / cloudy\n  if(ic===\u0027cloudy\u0027||ic===\u0027overcast\u0027)\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003cpath class=\"ic-fg\" d=\"M14 32a8 8 0 0 1 1-15 10 10 0 0 1 20 3 6 6 0 0 1-1 12H14Z\"/\u003e\n    \u003c/svg\u003e`;\n  // partly cloudy day\n  if(ic.includes(\u0027partly\u0027))\n    return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n      \u003ccircle class=\"ic-bg\" cx=\"18\" cy=\"18\" r=\"6\"/\u003e\n      \u003cpath class=\"ic-bg\" d=\"M18 6v4M6 18h4M18 30v-2M30 18h-2M9 9l3 3M27 9l-3 3M9 27l3-3\" stroke=\"var(--ic-bg)\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"/\u003e\n      \u003cpath class=\"ic-fg\" d=\"M20 38a7 7 0 0 1 1-13 9 9 0 0 1 17 2 5 5 0 0 1-1 11H20Z\"/\u003e\n    \u003c/svg\u003e`;\n  // default: clear day — sun\n  return `\u003csvg width=\"${sz}\" height=\"${sz}\" viewBox=\"0 0 48 48\"\u003e\n    \u003ccircle class=\"ic-fg\" cx=\"24\" cy=\"24\" r=\"9\"/\u003e\n    \u003cpath d=\"M24 8v5M24 35v5M8 24h5M35 24h5M13 13l3.5 3.5M31.5 31.5 35 35M35 13l-3.5 3.5M16.5 31.5 13 35\"\n      stroke=\"var(--ic-fg)\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\"/\u003e\n  \u003c/svg\u003e`;\n}\n\nfunction weatherDesc(icon,precip){\n  const ic=icon||\u0027\u0027,p=+(precip||0);\n  if(ic.includes(\u0027thunder\u0027))                       return \u0027Gewitter\u0027;\n  if(ic.includes(\u0027snow\u0027))                          return \u0027Schneefall\u0027;\n  if(ic.includes(\u0027sleet\u0027))                         return \u0027Schneeregen\u0027;\n  if(ic.includes(\u0027rain\u0027)\u0026\u0026p\u003e6)                     return \u0027Starker Regen\u0027;\n  if(ic.includes(\u0027rain\u0027)||ic.includes(\u0027drizzle\u0027))  return \u0027Leichter Regen\u0027;\n  if(ic.includes(\u0027fog\u0027))                           return \u0027Nebel\u0027;\n  if(ic===\u0027cloudy\u0027||ic===\u0027overcast\u0027)               return \u0027Bedeckt\u0027;\n  if(ic.includes(\u0027partly\u0027))                        return \u0027Teilweise bewölkt\u0027;\n  if(ic.includes(\u0027night\u0027)\u0026\u0026!ic.includes(\u0027cloud\u0027))  return \u0027Klare Nacht\u0027;\n  return \u0027Sonnig / Klar\u0027;\n}\n\nfunction windDirLabel(deg){\n  if(deg==null)return\u0027–\u0027;\n  return [\u0027N\u0027,\u0027NO\u0027,\u0027O\u0027,\u0027SO\u0027,\u0027S\u0027,\u0027SW\u0027,\u0027W\u0027,\u0027NW\u0027][Math.round(deg/45)%8];\n}\n\n/* ══════════════════════════════════\n   WEATHER COLOR CODING  (Design Guide §03)\n   Pastell, gedämpft — Tönung statt Vollfläche\n══════════════════════════════════ */\n/* Temperatur-Skala: kalt → heiß, klar lesbar auf Dunkel */\nconst TEMP_STOPS=[\n  [-10,[150,180,232]], // Frost · lavendel-blau\n  [  0,[127,176,224]], // kalt · blau\n  [  8,[111,195,212]], // kühl · teal\n  [ 15,[127,203,160]], // mild · grün\n  [ 21,[227,195,107]], // warm · gold\n  [ 27,[232,155, 90]], // heiß · orange\n  [ 33,[224,112, 88]], // extrem · rot\n];\nfunction tempRGB(t){\n  if(t\u003c=TEMP_STOPS[0][0]) return TEMP_STOPS[0][1];\n  if(t\u003e=TEMP_STOPS[TEMP_STOPS.length-1][0]) return TEMP_STOPS[TEMP_STOPS.length-1][1];\n  for(let i=0;i\u003cTEMP_STOPS.length-1;i++){\n    const [t0,c0]=TEMP_STOPS[i],[t1,c1]=TEMP_STOPS[i+1];\n    if(t\u003e=t0\u0026\u0026t\u003c=t1){\n      const f=(t-t0)/(t1-t0);\n      return c0.map((v,j)=\u003eMath.round(v+(c1[j]-v)*f));\n    }\n  }\n  return TEMP_STOPS[TEMP_STOPS.length-1][1];\n}\nfunction tempColor(t,a=1){\n  const [r,g,b]=tempRGB(+t||0);\n  return a\u003e=1?`rgb(${r},${g},${b})`:`rgba(${r},${g},${b},${a})`;\n}\n/* Icon in Temperaturfarbe tönen (zwei-stufig: Kontur voll, Fläche gedämpft) */\nfunction tintIcon(svg,t){\n  const [r,g,b]=tempRGB(+t||0);\n  return `\u003cspan class=\"ticon\" style=\"display:inline-flex;--ic-fg:rgb(${r},${g},${b});--ic-bg:rgba(${r},${g},${b},.45)\"\u003e${svg}\u003c/span\u003e`;\n}\n\n/* ── Demo fallback ── */\nfunction buildDemoWeather(){\n  const t0=new Date();t0.setHours(0,0,0,0);\n  const bases=[19,17,20,16,21,15,18];\n  const icDay=[\u0027clear-day\u0027,\u0027partly-cloudy-day\u0027,\u0027cloudy\u0027,\u0027rain\u0027,\u0027partly-cloudy-day\u0027,\u0027clear-day\u0027,\u0027clear-day\u0027];\n  return {weather:Array.from({length:168},(_,i)=\u003e{\n    const h=i%24,d=Math.floor(i/24);\n    const t=bases[d]+5*Math.sin((h-6)*Math.PI/12)+(Math.random()-.5)*.6;\n    const p=(d===3\u0026\u0026h\u003e=13\u0026\u0026h\u003c=18)?Math.random()*1.5:0;\n    return{\n      timestamp:new Date(t0.getTime()+i*3.6e6).toISOString(),\n      temperature:+t.toFixed(1),\n      precipitation:+p.toFixed(2),\n      wind_speed:+(8+Math.random()*10).toFixed(1),\n      wind_gust_speed:+(14+Math.random()*8).toFixed(1),\n      wind_direction:Math.round(Math.random()*360),\n      relative_humidity:Math.round(50+Math.random()*35),\n      pressure_msl:+(1006+Math.random()*20).toFixed(1),\n      cloud_cover:Math.round(p\u003e0?65:15+Math.random()*25),\n      visibility:Math.round(p\u003e0?15e3:50e3+Math.random()*15e3),\n      dew_point:+(t-8+Math.random()*4).toFixed(1),\n      icon:p\u003e0?\u0027rain\u0027:icDay[d],\n      condition:p\u003e0?\u0027rain\u0027:\u0027dry\u0027,\n    };\n  })};\n}\n\n/* ── ECharts shared base ── */\nconst BOPT={\n  backgroundColor:\u0027transparent\u0027,\n  textStyle:{color:\u0027var(--tx-3)\u0027,fontFamily:\u0027Inter\u0027,fontSize:11},\n  tooltip:{\n    trigger:\u0027axis\u0027,\n    backgroundColor:\u0027var(--bg-3)\u0027,\n    borderColor:\u0027var(--line-2)\u0027,\n    borderWidth:1,\n    textStyle:{color:\u0027var(--tx-1)\u0027,fontFamily:\u0027Inter\u0027,fontSize:12},\n    axisPointer:{lineStyle:{color:\u0027var(--line-2)\u0027,width:1,type:\u0027dashed\u0027}}\n  },\n  grid:{left:44,right:12,top:8,bottom:36}\n};\nconst AX={\n  type:\u0027category\u0027,\n  axisLine:{lineStyle:{color:\u0027var(--line-1)\u0027}},\n  axisTick:{show:false},\n  axisLabel:{color:\u0027#4A4A52\u0027,fontSize:11}\n};\nconst AY={\n  type:\u0027value\u0027,\n  splitLine:{lineStyle:{color:\u0027var(--line-1)\u0027,type:\u0027dashed\u0027}},\n  axisLine:{show:false},axisTick:{show:false},\n  axisLabel:{color:\u0027#4A4A52\u0027,fontSize:11}\n};\nconst AC=\u0027#7AAFC8\u0027; // accent hex approx of oklch(0.72 0.07 235)\n\nconst cTemp =echarts.init(document.getElementById(\u0027chart-temp\u0027), null,{renderer:\u0027svg\u0027});\nconst cPrecip=echarts.init(document.getElementById(\u0027chart-precip\u0027),null,{renderer:\u0027svg\u0027});\nconst cWind  =echarts.init(document.getElementById(\u0027chart-wind\u0027),  null,{renderer:\u0027svg\u0027});\nconst cTrend =echarts.init(document.getElementById(\u0027chart-trend\u0027), null,{renderer:\u0027svg\u0027});\nconst cDev   =echarts.init(document.getElementById(\u0027chart-deviation\u0027),null,{renderer:\u0027svg\u0027});\nconst cHeat  =echarts.init(document.getElementById(\u0027chart-heatmap\u0027),   null,{renderer:\u0027canvas\u0027}); // canvas für viele Zellen\n\n/* ── Load weather ── */\nasync function loadWeather(){\n  let data,isDemo=false;\n  try{\n    const r=await fetch(\n      `${API}/weather?lat=${geoLat}\u0026lon=${geoLon}`,\n      {signal:AbortSignal.timeout(9000)}\n    );\n    if(!r.ok)throw new Error(`HTTP ${r.status}`);\n    data=await r.json();setStatus(\u0027online\u0027);\n  }catch(e){\n    console.warn(\u0027[Weather] Demo-Fallback:\u0027,e.message);\n    setStatus(\u0027offline\u0027);data=buildDemoWeather();isDemo=true;\n  }\n  try{\n    const entries=data.weather;\n    if(!entries?.length)return;\n\n    // group by local date\n    const byDay={};\n    entries.forEach(e=\u003e{\n      const k=new Date(e.timestamp).toLocaleDateString(\u0027de-DE\u0027);\n      (byDay[k]=byDay[k]||[]).push(e);\n    });\n    const dayKeys=Object.keys(byDay);\n\n    // Save globally for day switching\n    allByDay=byDay; allDayKeys=dayKeys; weatherIsDemo=isDemo;\n\n    // 7-day strip\n    const DN=[\u0027So\u0027,\u0027Mo\u0027,\u0027Di\u0027,\u0027Mi\u0027,\u0027Do\u0027,\u0027Fr\u0027,\u0027Sa\u0027];\n    const days=dayKeys.slice(0,7).map((k,i)=\u003e{\n      const es=byDay[k],d=new Date(es[0].timestamp);\n      const mid=es[Math.floor(es.length/2)]||es[0];\n      return{\n        label:i===0?\u0027Heute\u0027:i===1?\u0027Morgen\u0027:DN[d.getDay()],\n        max:Math.round(Math.max(...es.map(e=\u003ee.temperature))),\n        min:Math.round(Math.min(...es.map(e=\u003ee.temperature))),\n        precip:es.reduce((s,e)=\u003es+(e.precipitation||0),0),\n        icon:mid.icon,today:i===0\n      };\n    });\n    document.getElementById(\u0027forecast-strip\u0027).innerHTML=days.map((d,i)=\u003e{\n      const [r,g,b]=tempRGB(d.max);\n      return `\n      \u003cdiv class=\"day${d.today?\u0027 today\u0027:\u0027\u0027}\" onclick=\"selectDay(${i})\"\n           style=\"--dtint:rgba(${r},${g},${b},.13)\"\u003e\n        \u003cdiv class=\"d\"\u003e${d.label}\u003c/div\u003e\n        \u003cdiv class=\"ic\"\u003e${tintIcon(weatherIcon(d.icon,28),d.max)}\u003c/div\u003e\n        \u003cdiv class=\"t\" style=\"color:${tempColor(d.max)}\"\u003e${d.max}\u003cspan class=\"deg\"\u003e°\u003c/span\u003e\u003c/div\u003e\n        \u003cdiv class=\"t-min\"\u003e${d.min}°\u003c/div\u003e\n        \u003cdiv class=\"pr\"\u003e${d.precip\u003e0.05?d.precip.toFixed(1)+\u0027 mm\u0027:\u0027—\u0027}\u003c/div\u003e\n      \u003c/div\u003e`;\n    }).join(\u0027\u0027);\n\n    // Render today\n    renderDay(0);\n\n  }catch(err){console.error(\u0027[Weather render]\u0027,err)}\n}\n\n/* ── Select a day from the strip ── */\nfunction selectDay(idx){\n  renderDay(idx);\n}\n\n/* ── Render hero + metrics + charts for a given day index ── */\nfunction renderDay(dayIdx){\n  const dayKey=allDayKeys[dayIdx];\n  if(!dayKey)return;\n  const dayEntries=allByDay[dayKey];\n  if(!dayEntries?.length)return;\n\n  // Update strip active state\n  document.querySelectorAll(\u0027#forecast-strip .day\u0027).forEach((el,i)=\u003e{\n    el.classList.toggle(\u0027today\u0027,i===dayIdx);\n  });\n\n  const isToday=dayIdx===0;\n  const nowH=new Date().getHours();\n  const curIdx=isToday?Math.min(nowH,dayEntries.length-1):Math.floor(dayEntries.length/2);\n  const cur=dayEntries[curIdx]??dayEntries[0];\n  const now=new Date(cur.timestamp);\n\n  // Hero card date/time\n  document.getElementById(\u0027wcard-day\u0027).textContent=\n    now.toLocaleDateString(\u0027de-DE\u0027,{weekday:\u0027long\u0027,day:\u0027numeric\u0027,month:\u0027long\u0027});\n  document.getElementById(\u0027wcard-time\u0027).textContent=\n    isToday?now.toLocaleTimeString(\u0027de-DE\u0027,{hour:\u00272-digit\u0027,minute:\u00272-digit\u0027})+\u0027 Uhr\u0027:\u002724h Übersicht\u0027;\n\n  // Hero numbers\n  document.getElementById(\u0027hero-temp\u0027).textContent=Math.round(cur.temperature);\n  document.getElementById(\u0027hero-temp\u0027).style.color=tempColor(cur.temperature);\n  document.getElementById(\u0027hero-desc\u0027).textContent=\n    weatherIsDemo?\u0027Demo-Daten · API offline\u0027:weatherDesc(cur.icon,cur.precipitation);\n  document.getElementById(\u0027hero-icon\u0027).innerHTML=tintIcon(weatherIcon(cur.icon,52),cur.temperature);\n\n  // Hero: nur Temperatur-Akzentleiste, kein farbiger Wash\n  const wcardEl=document.querySelector(\u0027.wcard\u0027);\n  if(wcardEl){\n    wcardEl.style.setProperty(\u0027--tac\u0027, tempColor(cur.temperature));\n  }\n\n  const tMax=Math.round(Math.max(...dayEntries.map(e=\u003ee.temperature)));\n  const tMin=Math.round(Math.min(...dayEntries.map(e=\u003ee.temperature)));\n  const tPrc=dayEntries.reduce((s,e)=\u003es+(e.precipitation||0),0);\n\n  document.getElementById(\u0027h-max\u0027).textContent=`${tMax}°`;\n  document.getElementById(\u0027h-max\u0027).style.color=tempColor(tMax);\n  document.getElementById(\u0027h-min\u0027).textContent=`${tMin}°`;\n  document.getElementById(\u0027h-min\u0027).style.color=tempColor(tMin);\n  document.getElementById(\u0027h-wind\u0027).textContent=`${Math.round(cur.wind_speed??0)} km/h`;\n  document.getElementById(\u0027h-press\u0027).textContent=`${Math.round(cur.pressure_msl??1013)} hPa`;\n  document.getElementById(\u0027h-precip\u0027).textContent=`${tPrc.toFixed(1)} mm`;\n  document.getElementById(\u0027h-hum\u0027).textContent=`${Math.round(cur.relative_humidity??60)} %`;\n\n  // Section label\n  const DN2=[\u0027So\u0027,\u0027Mo\u0027,\u0027Di\u0027,\u0027Mi\u0027,\u0027Do\u0027,\u0027Fr\u0027,\u0027Sa\u0027];\n  const secLabel=document.querySelector(\u0027.section-label .label\u0027);\n  if(secLabel) secLabel.textContent=\n    isToday?\u0027Heute — Übersicht\u0027:\n    dayIdx===1?\u0027Morgen — Übersicht\u0027:\n    DN2[now.getDay()]+\u0027 — Übersicht\u0027;\n\n  // Metric cards\n  const wv=Math.round(cur.wind_speed??0),gv=Math.round(cur.wind_gust_speed??0);\n  document.getElementById(\u0027m-wind-val\u0027).innerHTML=\n    `${wv} \u003cspan style=\"color:var(--tx-3);font-weight:400;font-size:14px\"\u003ekm/h\u003c/span\u003e`;\n  document.getElementById(\u0027m-wind-dir\u0027).textContent=\n    `${windDirLabel(cur.wind_direction??0)} · Böen ${gv}`;\n  document.getElementById(\u0027m-time\u0027).textContent=\n    isToday?now.toLocaleTimeString(\u0027de-DE\u0027,{hour:\u00272-digit\u0027,minute:\u00272-digit\u0027})+\u0027 Uhr\u0027:\u0027Tagesmitte\u0027;\n\n  // Wind mini-bars\n  const windVals=dayEntries.map(e=\u003ee.wind_speed||0);\n  const wMax=Math.max(...windVals)||1;\n  const hiIdx=isToday?Math.min(nowH,windVals.length-1):Math.floor(windVals.length/2);\n  document.getElementById(\u0027wind-bars\u0027).innerHTML=\n    windVals.map((v,i)=\u003e`\u003cspan style=\"height:${Math.max(8,v/wMax*100)}%\"${i===hiIdx?\u0027 class=\"hi\"\u0027:\u0027\u0027}\u003e\u003c/span\u003e`).join(\u0027\u0027);\n\n  const hum=Math.round(cur.relative_humidity??60);\n  document.getElementById(\u0027m-hum-val\u0027).innerHTML=`${hum}\u003cspan class=\"u\"\u003e%\u003c/span\u003e`;\n  document.getElementById(\u0027m-dewpoint\u0027).textContent=\n    `Taupunkt: ${Math.round(cur.dew_point??cur.temperature-7)}°`;\n  document.getElementById(\u0027m-hum-sub\u0027).textContent=hum\u003e80?\u0027feucht\u0027:hum\u003e60?\u0027moderat\u0027:\u0027trocken\u0027;\n\n  const prs=Math.round(cur.pressure_msl??1013);\n  document.getElementById(\u0027m-press-val\u0027).innerHTML=`${prs}\u003cspan class=\"u\"\u003ehPa\u003c/span\u003e`;\n  document.getElementById(\u0027m-press-sub\u0027).textContent=\n    prs\u003e1020?\u0027Hochdruck\u0027:prs\u003c1000?\u0027Tief\u0027:\u0027Normal · 1013 hPa\u0027;\n\n  const vis=cur.visibility;\n  const visKm=vis?+(vis/1000).toFixed(0):null;\n  document.getElementById(\u0027m-vis-val\u0027).innerHTML=\n    `${visKm??\u0027–\u0027}\u003cspan class=\"u\" id=\"m-vis-unit\"\u003ekm\u003c/span\u003e`;\n  document.getElementById(\u0027m-cloud\u0027).textContent=\n    `Bewölkung: ${Math.round(cur.cloud_cover??30)} %`;\n\n  // Chart sub-labels\n  const DN3=[\u0027So\u0027,\u0027Mo\u0027,\u0027Di\u0027,\u0027Mi\u0027,\u0027Do\u0027,\u0027Fr\u0027,\u0027Sa\u0027];\n  const dayLabel=isToday?\u0027heute\u0027:\n    dayIdx===1?\u0027morgen\u0027:\n    DN3[now.getDay()]+\u0027. \u0027+now.toLocaleDateString(\u0027de-DE\u0027,{day:\u0027numeric\u0027,month:\u0027numeric\u0027});\n  const subT=document.getElementById(\u0027chart-temp-sub\u0027);\n  if(subT) subT.textContent=`24 h · ${dayLabel}`;\n  const subP=document.getElementById(\u0027chart-precip-sub\u0027);\n  if(subP) subP.textContent=`24 h · ${dayLabel}`;\n\n  // Hourly charts\n  const hrs=dayEntries.map(e=\u003enew Date(e.timestamp).getHours()+\u0027:00\u0027);\n  const temps=dayEntries.map(e=\u003ee.temperature);\n  const precs=dayEntries.map(e=\u003e+(e.precipitation||0).toFixed(2));\n  const winds=dayEntries.map(e=\u003e+(e.wind_speed||0).toFixed(1));\n  const gusts=dayEntries.map(e=\u003e+(e.wind_gust_speed||0).toFixed(1));\n\n  cTemp.setOption({...BOPT,\n    xAxis:{...AX,data:hrs,axisLabel:{...AX.axisLabel,interval:3}},\n    yAxis:{...AY,axisLabel:{...AY.axisLabel,formatter:\u0027{value}°\u0027}},\n    visualMap:{show:false,type:\u0027continuous\u0027,dimension:1,seriesIndex:0,\n      min:-10,max:33,\n      inRange:{color:[\u0027#96B4E8\u0027,\u0027#7FB0E0\u0027,\u0027#6FC3D4\u0027,\u0027#7FCBA0\u0027,\u0027#E3C36B\u0027,\u0027#E89B5A\u0027,\u0027#E07058\u0027]}},\n    series:[{\n      name:\u0027Temp\u0027,data:temps,type:\u0027line\u0027,smooth:.4,symbol:\u0027none\u0027,\n      lineStyle:{width:2.5},\n      areaStyle:{opacity:.14},\n      tooltip:{valueFormatter:v=\u003e`${v.toFixed(1)} °C`}\n    }]\n  });\n\n  cPrecip.setOption({...BOPT,\n    grid:{left:44,right:12,top:8,bottom:36},\n    xAxis:{...AX,data:hrs,axisLabel:{...AX.axisLabel,interval:5}},\n    yAxis:{...AY,axisLabel:{...AY.axisLabel,formatter:\u0027{value}\u0027}},\n    series:[{\n      name:\u0027Niederschlag\u0027,data:precs,type:\u0027bar\u0027,barMaxWidth:10,\n      itemStyle:{color:\u0027#6E6E78\u0027,borderRadius:[2,2,0,0]},\n      tooltip:{valueFormatter:v=\u003e`${v.toFixed(2)} mm`}\n    }]\n  });\n\n  cWind.setOption({...BOPT,\n    grid:{left:44,right:12,top:8,bottom:36},\n    legend:{data:[\u0027Wind\u0027,\u0027Böen\u0027],bottom:0,textStyle:{color:\u0027#4A4A52\u0027,fontSize:10}},\n    xAxis:{...AX,data:hrs,axisLabel:{...AX.axisLabel,interval:5}},\n    yAxis:{...AY,axisLabel:{...AY.axisLabel,formatter:\u0027{value}\u0027}},\n    series:[\n      {name:\u0027Wind\u0027,data:winds,type:\u0027line\u0027,smooth:.4,symbol:\u0027circle\u0027,symbolSize:6,\n        lineStyle:{color:\u0027#E8E8EC\u0027,width:1.5},\n        itemStyle:{color:\u0027#E8E8EC\u0027},           // Legenden-Punkt = Linienfarbe\n        areaStyle:{color:{type:\u0027linear\u0027,x:0,y:0,x2:0,y2:1,\n          colorStops:[{offset:0,color:\u0027rgba(232,232,236,.12)\u0027},{offset:1,color:\u0027rgba(232,232,236,.01)\u0027}]}},\n        tooltip:{valueFormatter:v=\u003e`${v.toFixed(1)} km/h`}},\n      {name:\u0027Böen\u0027,data:gusts,type:\u0027line\u0027,smooth:.4,symbol:\u0027circle\u0027,symbolSize:6,\n        lineStyle:{color:\u0027#6E6E78\u0027,width:1.5,type:\u0027dashed\u0027},\n        itemStyle:{color:\u0027#6E6E78\u0027},           // Legenden-Punkt = Linienfarbe\n        tooltip:{valueFormatter:v=\u003e`${v.toFixed(1)} km/h`}}\n    ]\n  });\n}\n\n/* ── Klimadaten global speichern (für Zeitbereich-Filter) ── */\nlet climateDataFull = null;\n\n/* ── Klimacharts für einen bestimmten Zeitbereich rendern ── */\nfunction renderClimateCharts(d, fromY, toY){\n  fromY = +fromY; toY = +toY;\n\n  // Indizes der Jahre im gewünschten Bereich\n  const idx = d.years.reduce((acc,y,i)=\u003e{ if(y\u003e=fromY\u0026\u0026y\u003c=toY) acc.push(i); return acc; },[]);\n  if(!idx.length) return;\n\n  const years  = idx.map(i=\u003ed.years[i]);\n  const annual = idx.map(i=\u003ed.annual_temp[i]);\n  const avg5   = idx.map(i=\u003ed.moving_avg_5y[i]);\n  const avg10  = idx.map(i=\u003ed.moving_avg_10y[i]);\n  const dev    = idx.map(i=\u003ed.deviation[i]);\n  const fy=years[0], ly=years[years.length-1];\n\n  // Hint aktualisieren\n  const hint=document.getElementById(\u0027yr-hint\u0027);\n  if(hint) hint.textContent=`${fy}–${ly} · ${years.length} Jahre`;\n\n  // X-Achse: Dekaden + Endpunkte\n  function decadeInterval(_,val){ const y=+val; return(y%10===0)||(y===fy)||(y===ly); }\n  const clXAxis={...AX,data:years,boundaryGap:true,\n    axisLabel:{...AX.axisLabel,interval:decadeInterval}};\n\n  // Referenzlinie\n  const refLine=new Array(years.length).fill(d.reference_mean);\n\n  /* Trend-Chart */\n  cTrend.setOption({...BOPT,\n    // ECharts-Legende entfernt — die korrekte Legende sitzt im HTML-Kartenheader\n    grid:{left:52,right:16,top:16,bottom:24},\n    xAxis:clXAxis,\n    yAxis:{...AY,\n      min:v=\u003eMath.floor((v.min-.3)*2)/2,\n      max:v=\u003eMath.ceil( (v.max+.3)*2)/2,\n      axisLabel:{...AY.axisLabel,formatter:v=\u003e`${v.toFixed(1)}°`}},\n    series:[\n      {name:\u0027Jahresmittel\u0027,data:annual,type:\u0027line\u0027,\n        symbol:\u0027circle\u0027,symbolSize:4,showSymbol:false,\n        lineStyle:{color:\u0027#6E6E78\u0027,width:1},\n        itemStyle:{color:\u0027#6E6E78\u0027},\n        tooltip:{valueFormatter:v=\u003ev!=null?`${v.toFixed(2)} °C`:\u0027-\u0027},\n        emphasis:{focus:\u0027self\u0027}},\n      {name:\u00275J Mittel\u0027,data:avg5,type:\u0027line\u0027,\n        symbol:\u0027none\u0027,smooth:.45,\n        lineStyle:{color:\u0027#E8E8EC\u0027,width:1.5},\n        itemStyle:{color:\u0027#E8E8EC\u0027},\n        tooltip:{valueFormatter:v=\u003ev!=null?`${v.toFixed(2)} °C`:\u0027-\u0027}},\n      {name:\u002710J Trend\u0027,data:avg10,type:\u0027line\u0027,\n        symbol:\u0027none\u0027,smooth:.45,\n        lineStyle:{color:AC,width:2.5},\n        itemStyle:{color:AC},\n        tooltip:{valueFormatter:v=\u003ev!=null?`${v.toFixed(2)} °C`:\u0027-\u0027}},\n      {name:\u0027Ø 1961–1990\u0027,data:refLine,type:\u0027line\u0027,\n        symbol:\u0027none\u0027,\n        lineStyle:{color:\u0027#4A4A52\u0027,width:1,type:[4,4]},\n        itemStyle:{color:\u0027#4A4A52\u0027},\n        tooltip:{valueFormatter:_=\u003e`${d.reference_mean} °C`},\n        emphasis:{disabled:true}},\n    ]\n  });\n\n  /* ── Monatliche Heatmap ──────────────────────────────────────────── */\n  if(d.monthly_data?.length){\n    const MONTHS=[\u0027Jan\u0027,\u0027Feb\u0027,\u0027Mär\u0027,\u0027Apr\u0027,\u0027Mai\u0027,\u0027Jun\u0027,\u0027Jul\u0027,\u0027Aug\u0027,\u0027Sep\u0027,\u0027Okt\u0027,\u0027Nov\u0027,\u0027Dez\u0027];\n\n    // Monatsdaten auf aktuellen Jahresbereich filtern\n    const mFiltered = d.monthly_data.filter(([y])=\u003ey\u003e=fromY\u0026\u0026y\u003c=toY);\n\n    // ECharts braucht [xIndex(Monat 0-11), yIndex(Jahr-Position), Temp]\n    const heatData = mFiltered.map(([yr, mo, temp])=\u003e[\n      mo - 1,           // Monat 0-basiert\n      years.indexOf(yr),// Position im gefilterten years-Array\n      temp\n    ]).filter(([,yIdx])=\u003eyIdx\u003e=0); // nur Jahre die im gefilterten Bereich sind\n\n    // Dynamische Farbskala basierend auf echten Min/Max-Werten\n    const allTemps = mFiltered.map(([,,t])=\u003et);\n    const tMin = Math.floor(Math.min(...allTemps));\n    const tMax = Math.ceil( Math.max(...allTemps));\n\n    // Höhe dynamisch: ~6 px pro Jahr, zwischen 200 und 560 px\n    const heatH = Math.min(560, Math.max(200, years.length * 6));\n    const heatEl = document.getElementById(\u0027chart-heatmap\u0027);\n    if(heatEl){ heatEl.style.height = heatH + \u0027px\u0027; cHeat.resize(); }\n\n    // Untertitel aktualisieren\n    const hs=document.getElementById(\u0027heat-sub\u0027);\n    if(hs) hs.textContent=`Heatmap · ${fy}–${ly} · ${years.length} Jahre`;\n\n    cHeat.setOption({\n      backgroundColor:\u0027transparent\u0027,\n      tooltip:{\n        trigger:\u0027item\u0027,\n        backgroundColor:\u0027var(--bg-3)\u0027,\n        borderColor:\u0027var(--line-2)\u0027,\n        borderWidth:1,\n        textStyle:{color:\u0027var(--tx-1)\u0027,fontFamily:\u0027Inter\u0027,fontSize:12},\n        formatter:({data})=\u003e{\n          if(!data)return\u0027\u0027;\n          const [mI,yI,t]=data;\n          return `\u003cb\u003e${years[yI]}\u003c/b\u003e · ${MONTHS[mI]}\u003cbr/\u003e${t!=null?t.toFixed(1)+\u0027 °C\u0027:\u0027–\u0027}`;\n        }\n      },\n      grid:{left:52,right:16,top:8,bottom:44},\n      xAxis:{\n        type:\u0027category\u0027,\n        data:MONTHS,\n        axisLine:{lineStyle:{color:\u0027var(--line-1)\u0027}},\n        axisTick:{show:false},\n        axisLabel:{color:\u0027#4A4A52\u0027,fontSize:11},\n        splitArea:{show:true,areaStyle:{color:[\u0027transparent\u0027,\u0027rgba(255,255,255,.015)\u0027]}}\n      },\n      yAxis:{\n        type:\u0027category\u0027,\n        data:years,\n        inverse:false,           // ältestes Jahr unten, neuestes oben (Standard)\n        axisLine:{lineStyle:{color:\u0027var(--line-1)\u0027}},\n        axisTick:{show:false},\n        axisLabel:{\n          color:\u0027#4A4A52\u0027,fontSize:10,fontFamily:\u0027JetBrains Mono, monospace\u0027,\n          interval:(idx,val)=\u003e(+val%10===0)||(+val===fy)||(+val===ly)\n        }\n      },\n      visualMap:{\n        show:false,\n        min:tMin, max:tMax,\n        inRange:{color:[\n          \u0027#1a3a6b\u0027,\u0027#1d4ed8\u0027,\u0027#60a5fa\u0027,\u0027#bfdbfe\u0027,\n          \u0027#fef9e7\u0027,\n          \u0027#fde68a\u0027,\u0027#fb923c\u0027,\u0027#dc2626\u0027,\u0027#7f1d1d\u0027\n        ]}\n      },\n      series:[{\n        type:\u0027heatmap\u0027,\n        data:heatData,\n        label:{show:false},\n        emphasis:{\n          itemStyle:{\n            borderWidth:1.5,\n            borderColor:\u0027var(--ac)\u0027,\n            shadowBlur:4,\n            shadowColor:\u0027rgba(0,0,0,.5)\u0027\n          }\n        }\n      }]\n    });\n  }\n\n  /* Warming Stripes */\n  const devVals=dev.filter(v=\u003ev!=null);\n  const devAbs=Math.max(...devVals.map(Math.abs));\n  const devMax=Math.ceil(devAbs*10)/10;\n\n  const deviationData=dev.map((v,i)=\u003e({\n    value:v,\n    itemStyle: d.is_partial_year\u0026\u0026idx[i]===d.years.length-1 ? {opacity:.55} : undefined\n  }));\n\n  cDev.setOption({...BOPT,\n    grid:{left:52,right:16,top:8,bottom:36},\n    xAxis:{...clXAxis,axisTick:{show:false}},\n    yAxis:{...AY,\n      min:-devMax,max:devMax,\n      axisLabel:{...AY.axisLabel,formatter:v=\u003e`${v\u003e0?\u0027+\u0027:\u0027\u0027}${v.toFixed(1)}°`},\n      splitLine:{lineStyle:{color:\u0027var(--line-1)\u0027,type:\u0027dashed\u0027}}},\n    visualMap:{show:false,min:-devMax,max:devMax,\n      inRange:{color:[\u0027#1a3a6b\u0027,\u0027#1d4ed8\u0027,\u0027#60a5fa\u0027,\u0027#bfdbfe\u0027,\n        \u0027#ffffff\u0027,\u0027#fde68a\u0027,\u0027#f97316\u0027,\u0027#dc2626\u0027,\u0027#7f1d1d\u0027]}},\n    series:[{\n      name:\u0027Temperaturabweichung\u0027,data:deviationData,type:\u0027bar\u0027,\n      barCategoryGap:\u00272%\u0027,barMaxWidth:22,\n      tooltip:{valueFormatter:v=\u003ev!=null?`${v\u003e0?\u0027+\u0027:\u0027\u0027}${v.toFixed(2)} °C`:\u0027-\u0027},\n      markLine:{silent:true,symbol:\u0027none\u0027,\n        lineStyle:{color:\u0027rgba(255,255,255,.25)\u0027,width:1,type:\u0027solid\u0027},\n        data:[{yAxis:0}]}\n    }]\n  });\n}\n\n/* ── Jahresbereich anwenden ── */\nfunction applyYearRange(){\n  if(!climateDataFull) return;\n  let fromY=+document.getElementById(\u0027yr-from\u0027).value;\n  let toY  =+document.getElementById(\u0027yr-to\u0027).value;\n  if(fromY\u003etoY)[fromY,toY]=[toY,fromY];\n  const minY=climateDataFull.first_year??climateDataFull.years[0];\n  const maxY=climateDataFull.last_year ??climateDataFull.years[climateDataFull.years.length-1];\n  fromY=Math.max(fromY,minY); toY=Math.min(toY,maxY);\n  renderClimateCharts(climateDataFull,fromY,toY);\n}\n\n/* ── Jahresbereich zurücksetzen ── */\nfunction resetYearRange(){\n  if(!climateDataFull) return;\n  const fy=climateDataFull.first_year??climateDataFull.years[0];\n  const ly=climateDataFull.last_year ??climateDataFull.years[climateDataFull.years.length-1];\n  document.getElementById(\u0027yr-from\u0027).value=fy;\n  document.getElementById(\u0027yr-to\u0027).value  =ly;\n  renderClimateCharts(climateDataFull,fy,ly);\n}\n\n/* ── Klimadaten laden ── */\nasync function loadClimate(){\n  const lo={text:\u0027Lade DWD-Daten…\u0027,color:AC,textColor:\u0027#7A7A85\u0027,maskColor:\u0027rgba(11,11,13,.8)\u0027,zlevel:0};\n  cTrend.showLoading(lo);cDev.showLoading({...lo,text:\u0027\u0027});\n  try{\n    const r=await fetch(`${API}/climate-trends?lat=${geoLat}\u0026lon=${geoLon}`);\n    if(!r.ok)throw new Error(`HTTP ${r.status}`);\n    const d=await r.json();\n    cTrend.hideLoading();cDev.hideLoading();\n\n    climateDataFull=d;\n\n    /* Jahreszahl-Inputs befüllen */\n    const fy=d.first_year??d.years?.[0]??1950;\n    const ly=d.last_year ??d.years?.[d.years.length-1]??new Date().getFullYear();\n    const yrFrom=document.getElementById(\u0027yr-from\u0027);\n    const yrTo  =document.getElementById(\u0027yr-to\u0027);\n    if(yrFrom){yrFrom.min=fy;yrFrom.max=ly;yrFrom.value=fy;}\n    if(yrTo)  {yrTo.min=fy;  yrTo.max=ly;  yrTo.value=ly;}\n\n    /* Texte dynamisch */\n    const rangeLabel=d.is_partial_year?`${fy}–${ly} (lfd.)`:`${fy}–${ly}`;\n    const set=(id,txt)=\u003e{const el=document.getElementById(id);if(el)el.textContent=txt;};\n    set(\u0027climate-title\u0027,`Historische Klimaanalyse ${rangeLabel}`);\n    set(\u0027trend-sub\u0027,`${d.station_name??geoCity} ${rangeLabel} · gleitende Durchschnitte`);\n    set(\u0027dev-sub\u0027,`Warming Stripes · Basis 1961–1990 · ${d.station_name??geoCity}`);\n    if(d.station_name)\n      set(\u0027climate-station-label\u0027,\n        d.source\n          ? `${d.source} · ${d.station_name}`\n          : d.station_id\n            ? `DWD Station ${d.station_name} (ID ${d.station_id})`\n            : d.station_name ?? \u0027Klimadaten geladen\u0027\n      );\n    const fs=document.getElementById(\u0027footer-source\u0027);\n    if(fs) fs.textContent=`Vorhersage: Bright Sky / DWD MOSMIX · Klimadaten: ${d.source??\u0027ERA5\u0027} (${rangeLabel})`;\n\n    /* Stats-Banner */\n    if(d.reference_mean!=null){\n      set(\u0027stat-ref\u0027,`${d.reference_mean}°C`);\n      set(\u0027stat-years\u0027,rangeLabel);\n      set(\u0027stat-years-label\u0027,\u0027Zeitraum\u0027);\n      const recent10=d.annual_temp.filter(Boolean).slice(-10);\n      const rm10=recent10.reduce((a,b)=\u003ea+b,0)/recent10.length;\n      const diff=(rm10-d.reference_mean).toFixed(2);\n      const el=document.getElementById(\u0027stat-trend\u0027);\n      if(el){el.textContent=`${diff\u003e0?\u0027+\u0027:\u0027\u0027}${diff}°C`;\n        el.style.color=diff\u003e0?\u0027var(--bad)\u0027:\u0027var(--good)\u0027;}\n    }\n\n    /* Charts rendern */\n    renderClimateCharts(d,fy,ly);\n\n  }catch(err){\n    cTrend.hideLoading();cDev.hideLoading();\n    [cTrend,cDev].forEach(c=\u003ec.setOption({...BOPT,\n      graphic:[{type:\u0027text\u0027,left:\u0027center\u0027,top:\u0027middle\u0027,\n        style:{text:\u0027DWD-Daten nicht verfügbar\\n(API offline)\u0027,\n          fill:\u0027#4A4A52\u0027,fontSize:13,fontFamily:\u0027Inter\u0027,textAlign:\u0027center\u0027}}]\n    }));\n    console.warn(\u0027[Climate] API offline:\u0027,err?.message||err);\n  }\n}\n\nwindow.addEventListener(\u0027resize\u0027,()=\u003e[cTemp,cPrecip,cWind,cTrend,cDev,cHeat].forEach(c=\u003ec\u0026\u0026c.resize()));\n\nloadWeather();\nloadClimate();\n\u003c/script\u003e\n\n\n\u003c/body\u003e\u003c/html\u003e"</script>
