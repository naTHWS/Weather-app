<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Würzburg Wetter &amp; Klimaanalyse</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div class="overlay">
    <div class="glass-menu">
      <div style="font-size:1.1rem;font-weight:600;letter-spacing:2px;">WÜRZBURG WETTER</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="status-dot" style="width:10px;height:10px;border-radius:50%;background:#FF6B6B;display:inline-block;"></span>
        <span id="status-text" style="font-size:0.85rem;opacity:0.8;">Lade...</span>
      </div>
      <div class="nav-links">
        <span>Vorhersage</span>
        <span>Klima</span>
        <span>Karte</span>
      </div>
    </div>

    <div class="side-panel left glass-panel">
      <h3>7-Tage Vorhersage</h3>
      <div id="temp-chart" style="height:180px;"></div>
      <div id="precip-chart" style="height:150px;margin-top:10px;"></div>
    </div>

    <div class="side-panel right glass-panel">
      <h3>Klimatrend 1940–Heute</h3>
      <div id="trend-chart" style="height:180px;"></div>
      <div id="deviation-chart" style="height:150px;margin-top:10px;"></div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
