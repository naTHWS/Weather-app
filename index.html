  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

src: url(\"83eccd97-8ec8-40bd-800d-b878b7c28c38\") format(\u0027woff2\u0027);\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: \u0027JetBrains Mono\u0027;\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"da9ec239-93ff-4a9e-846d-50fabaa6e850\") format(\u0027woff2\u0027);\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\u003c/style\u003e\n\u003cscript src=\"ff14c055-6905-45b8-a46b-ff9cd1206c6e\"\u003e\u003c/script\u003e\n\n\n\n\u003cstyle\u003e\n/* ══════════════════════════════════\n   DESIGN TOKENS  (Design Guide v0.1)\n══════════════════════════════════ */\n:root{\n  --bg-0:    #0B0B0D;\n  --bg-1:    #121215;\n  --bg-2:    #191920;\n  --bg-3:    #23232B;\n\n  --line-1:  #1E1E25;\n  --line-2:  #2A2A33;\n\n  --tx-1:    #F2F2F4;\n  --tx-2:    #B7B7BF;\n  --tx-3:    #7A7A85;\n  --tx-4:    #4A4A52;\n\n  --ic-fg:   #E8E8EC;\n  --ic-bg:   #6E6E78;\n\n  /* single accent — muted slate-blue */\n  --ac:      oklch(0.72 0.07 235);\n  --ac-soft: oklch(0.72 0.07 235 / 0.16);\n  --ac-line: oklch(0.72 0.07 235 / 0.40);\n  /* hex approximation for ECharts */\n  --ac-hex:  #7AAFC8;\n\n  --good:    oklch(0.74 0.07 165);\n  --warn:    oklch(0.78 0.07  75);\n  --bad:     oklch(0.70 0.07  25);\n\n  /* ── Weather coding (pastell, semantisch) ── */\n  --w-rain:     #8FB4D9;\n  --w-snow:     #CBD9E0;\n  --w-thunder:  #B6A6D9;\n  --w-fog:      #C5C3B6;\n  --w-wind:     #A9C6DE;\n  --w-humidity: #9FCBC8;\n  --w-pressure: #AEC8B4;\n  --w-uv:       #E6CB97;\n\n  --ff-sans: \u0027Inter\u0027, system-ui, sans-serif;\n  --ff-mono: \u0027JetBrains Mono\u0027, ui-monospace, monospace;\n\n  --r-sm:   8px;\n  --r-md:  14px;\n  --r-lg:  20px;\n  --r-pill:999px;\n\n  --sh-1: 0 1px 0 rgba(255,255,255,.02) inset, 0 1px 2px rgba(0,0,0,.4);\n  --sh-2: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.45);\n}\n\n/* ── Reset ── */\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml,body{background:var(--bg-0);color:var(--tx-1);font-family:var(--ff-sans);-webkit-font-smoothing:antialiased}\nbody{font-size:15px;line-height:1.55;font-weight:400;letter-spacing:-.005em}\n\n/* ── ic-fg / ic-bg helpers (SVG class selectors) ── */\n.ic-fg{fill:var(--ic-fg)}\n.ic-bg{fill:var(--ic-bg)}\n\n/* ── Type scale ── */\n.label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx-3);font-weight:500}\n.mono {font-family:var(--ff-mono);font-size:12px;color:var(--tx-3)}\n\n/* ── Header ── */\n.site-header{\n  position:sticky;top:0;z-index:50;\n  background:var(--bg-0);\n  border-bottom:1px solid var(--line-1);\n  padding:0 32px;\n}\n.hdr-inner{\n  max-width:1280px;margin:0 auto;\n  height:56px;\n  display:flex;align-items:center;justify-content:space-between;gap:24px;\n}\n/* (hdr-city styles moved to city-picker block below) */\n\n/* ── Segmented tab ── */\n.seg{\n  display:inline-flex;\n  background:var(--bg-2);\n  border:1px solid var(--line-2);\n  border-radius:var(--r-pill);\n  padding:3px;\n}\n.seg button{\n  background:transparent;border:none;\n  color:var(--tx-3);\n  padding:6px 18px;\n  border-radius:var(--r-pill);\n  font:500 12.5px/1 var(--ff-sans);\n  cursor:pointer;\n  transition:color .15s,background .15s;\n  letter-spacing:-.005em;\n}\n.seg button:hover:not(.on){color:var(--tx-2)}\n.seg button.on{background:var(--bg-0);color:var(--tx-1)}\n.seg button:active{opacity:.7;transform:scale(.97)}\n\n/* ── Status chip ── */\n.chip{\n  display:inline-flex;align-items:center;gap:6px;\n  padding:5px 12px;\n  border-radius:var(--r-pill);\n  background:var(--bg-2);\n  border:1px solid var(--line-2);\n  color:var(--tx-3);\n  font-size:11.5px;font-weight:500;\n  font-family:var(--ff-mono);\n  white-space:nowrap;\n  transition:border-color .2s,color .2s,background .2s;\n}\n.chip-online{\n  background:rgba(140,200,170,.08);\n  border-color:rgba(140,200,170,.25);\n  color:var(--good);\n}\n.chip-offline{\n  background:rgba(220,150,140,.08);\n  border-color:rgba(220,150,140,.2);\n  color:var(--bad);\n}\n.chip-demo{\n  background:rgba(200,180,100,.08);\n  border-color:rgba(200,180,100,.2);\n  color:var(--warn);\n}\n\n/* ── Main layout ── */\n.main-wrap{max-width:1280px;margin:0 auto;padding:28px 32px 80px}\n\n/* ── Section hide/show ── */\n.section{display:none}.section.active{display:block}\n\n/* ── Forecast grid (8 + 4 col) ── */\n.forecast-grid{\n  display:grid;\n  grid-template-columns:1.45fr 1fr;\n  gap:16px;\n}\n.forecast-left{display:flex;flex-direction:column;gap:16px}\n.forecast-right{display:flex;flex-direction:column;gap:16px}\n\n/* ── Weather Hero card (wcard) ── */\n.wcard{\n  background:linear-gradient(180deg, var(--bg-2), var(--bg-1));\n  border:1px solid var(--line-2);\n  border-radius:var(--r-md);\n  padding:22px;\n  position:relative;\n  overflow:hidden;\n  box-shadow:var(--sh-2);\n}\n/* temperature accent bar at bottom — set --tac via JS */\n.wcard::after{\n  content:\"\";position:absolute;left:0;right:0;bottom:0;height:3px;\n  background:var(--tac, var(--ic-bg));opacity:.9;z-index:1;\n  transition:background .5s ease;\n}\n.wcard \u003e *{position:relative;z-index:1}\n.wcard-top{\n  display:flex;justify-content:space-between;align-items:center;\n  font-size:12px;color:var(--tx-3);\n  margin-bottom:16px;\n}\n.wcard-main{display:flex;justify-content:space-between;align-items:flex-start}\n.wcard-temp{\n  font-size:52px;font-weight:600;letter-spacing:-.04em;line-height:1;\n  display:flex;align-items:flex-start;\n}\n.wcard-temp .deg{font-size:22px;color:var(--tx-3);margin-top:7px;margin-left:2px;font-weight:400}\n.wcard-desc{font-size:13.5px;color:var(--tx-2);margin-top:8px}\n.wcard-stats{\n  display:grid;grid-template-columns:1fr 1fr;\n  gap:5px 20px;\n  margin-top:20px;\n}\n.wcard-stats .row{display:flex;justify-content:space-between;font-size:12px}\n.wcard-stats .k{color:var(--tx-3)}\n.wcard-stats .v{color:var(--tx-1);font-weight:500;font-family:var(--ff-mono)}\n\n/* ── 7-day strip ── */\n.day-strip-wrap{\n  background:var(--bg-1);\n  border:1px solid var(--line-1);\n  border-radius:var(--r-md);\n  padding:20px;\n}\n.day-strip-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}\n.day-strip{\n  display:grid;\n  grid-template-columns:repeat(7,1fr);\n  gap:8px;\n}\n.day{\n  background:var(--bg-1);\n  border:1px solid var(--line-1);\n  border-radius:var(--r-md);\n  padding:16px 10px;\n  text-align:center;\n  cursor:pointer;\n  position:relative;\n  overflow:hidden;\n  transition:border-color .15s, transform .12s;\n}\n.day::before{\n  content:\"\";position:absolute;inset:0;\n  background:linear-gradient(180deg, var(--dtint, transparent), transparent 70%);\n  pointer-events:none;\n}\n.day\u003e*{position:relative;z-index:1}\n.day:hover{border-color:var(--line-2);transform:translateY(-2px)}\n.day.today{\n  border-color:var(--line-2);\n  box-shadow:inset 0 0 0 1px var(--line-2);\n}\n.day .d{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx-3);margin-bottom:12px}\n.day.today .d{color:var(--tx-1)}\n.day .ic{display:flex;justify-content:center;margin-bottom:12px}\n.day .t{font-size:20px;font-weight:600;letter-spacing:-.02em}\n.day .t .deg{color:var(--tx-3);font-size:13px;font-weight:400}\n.day .t-min{font-size:12px;color:var(--tx-3);margin-top:3px;font-family:var(--ff-mono)}\n.day .pr{font-size:11px;color:var(--tx-4);margin-top:4px;font-family:var(--ff-mono)}\n\n/* ── Section divider label ── */\n.section-label{\n  display:flex;align-items:center;gap:16px;\n  padding:6px 0;\n}\n.section-label .line{flex:1;height:1px;background:var(--line-1)}\n\n/* ── Metric 2×2 grid ── */\n.metric-grid{\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:12px;\n}\n.metric{\n  background:var(--bg-1);\n  border:1px solid var(--line-1);\n  border-radius:var(--r-md);\n  padding:20px;\n  box-shadow:var(--sh-1);\n}\n.metric .head{\n  display:flex;justify-content:space-between;align-items:center;\n  margin-bottom:20px;\n}\n.metric .head .t{font-size:13.5px;font-weight:600;letter-spacing:-.01em}\n.metric .head .sub{font-size:11px;color:var(--tx-3);font-family:var(--ff-mono)}\n.metric .v{\n  font-size:30px;font-weight:600;\n  letter-spacing:-.025em;line-height:1;\n}\n.metric .v .u{font-size:14px;color:var(--tx-3);font-weight:400;margin-left:3px}\n.metric .foot{\n  display:flex;justify-content:space-between;align-items:center;\n  margin-top:14px;\n  font-size:11.5px;color:var(--tx-3);\n  font-family:var(--ff-mono);\n}\n/* bar mini for wind */\n.bars{display:flex;align-items:flex-end;gap:2px;height:48px;margin-top:14px}\n.bars span{flex:1;background:var(--ic-bg);border-radius:2px 2px 0 0;opacity:.5}\n.bars span.hi{background:var(--ic-fg);opacity:1}\n\n/* ── Chart cards (right column) ── */\n.chart-card{\n  background:var(--bg-1);\n  border:1px solid var(--line-1);\n  border-radius:var(--r-md);\n  padding:20px;\n  box-shadow:var(--sh-1);\n  flex:1;\n}\n.chart-card .head{\n  display:flex;justify-content:space-between;align-items:center;\n  margin-bottom:16px;\n}\n.chart-card .head .t{font-size:13.5px;font-weight:600;letter-spacing:-.01em}\n.chart-card .head .sub{font-size:11px;color:var(--tx-3);font-family:var(--ff-mono)}\n\n/* ── Skeleton ── */\n@keyframes shimmer{\n  0%  {background-position:-500px 0}\n  100%{background-position: 500px 0}\n}\n.skeleton{\n  background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);\n  background-size:500px 100%;\n  animation:shimmer 1.5s ease-in-out infinite;\n  border-radius:var(--r-sm);\n}\n\n/* ── Climate section ── */\n.climate-stack{display:flex;flex-direction:column;gap:16px}\n.climate-banner{\n  background:var(--bg-1);\n  border:1px solid var(--line-1);\n  border-radius:var(--r-md);\n  padding:22px 24px;\n  display:flex;align-items:center;justify-content:space-between;\n  gap:32px;\n  flex-wrap:wrap;\n}\n.climate-banner .info .name{font-size:17px;font-weight:600;letter-spacing:-.015em;margin-bottom:4px}\n.climate-banner .info .sub{font-size:12px;color:var(--tx-3);font-family:var(--ff-mono)}\n.climate-banner .stats{display:flex;gap:40px;flex-shrink:0}\n.climate-banner .stat .k{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--tx-3);font-weight:500;margin-bottom:6px}\n.climate-banner .stat .v{font-size:26px;font-weight:600;letter-spacing:-.025em}\n\n/* ── Jahresbereich-Selektor ── */\n.yr-ctrl{\n  display:flex;align-items:center;gap:12px;\n  padding:12px 20px;\n  background:var(--bg-1);\n  border:1px solid var(--line-1);\n  border-radius:var(--r-md);\n  flex-wrap:wrap;\n}\n.yr-ctrl .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-4);font-weight:500;white-space:nowrap}\n.yr-inputs{display:flex;align-items:center;gap:8px}\n.yr-in{\n  width:70px;\n  background:var(--bg-2);\n  border:1px solid var(--line-2);\n  border-radius:var(--r-sm);\n  color:var(--tx-1);\n  font:500 13px var(--ff-mono);\n  padding:5px 8px;\n  text-align:center;\n  outline:none;\n  -moz-appearance:textfield;\n  transition:border-color .15s;\n}\n.yr-in::-webkit-inner-spin-button,.yr-in::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}\n.yr-in:focus{border-color:var(--ac-line)}\n.yr-sep{color:var(--tx-4);font-size:14px;font-family:var(--ff-mono)}\n/* Jahresbereich-Buttons — Design Guide: Secondary + Ghost */\n.yr-btn{\n  display:inline-flex;align-items:center;\n  padding:7px 16px;\n  border-radius:var(--r-pill);          /* Pill wie alle Buttons im Guide */\n  font:500 13px/1 var(--ff-sans);\n  border:1px solid transparent;\n  cursor:pointer;\n  transition:background .15s,color .15s,transform .06s,opacity .06s;\n  letter-spacing:-.005em;\n  white-space:nowrap;\n}\n.yr-btn:active{transform:translateY(1px);opacity:.8}\n\n/* Secondary — bg-2, tx-1, border line-2 */\n.yr-btn-apply{\n  background:var(--bg-2);\n  color:var(--tx-1);\n  border-color:var(--line-2);\n}\n.yr-btn-apply:hover{background:var(--bg-3)}\n\n/* Ghost — transparent, tx-2 */\n.yr-btn-reset{\n  background:transparent;\n  color:var(--tx-2);\n  border-color:transparent;\n}\n.yr-btn-reset:hover{color:var(--tx-1);background:var(--bg-2)}\n.yr-hint{margin-left:auto;font-size:11px;color:var(--tx-4);font-family:var(--ff-mono);white-space:nowrap}\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar{width:4px;height:4px}\n::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:2px}\n\n/* ── Fade up ── */\n@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n.fu{opacity:1}\n@media (prefers-reduced-motion: no-preference){\n  .fu{animation:fadeUp .45s cubic-bezier(.22,.68,0,1.2) both}\n  .fu1{animation-delay:.06s}.fu2{animation-delay:.12s}\n  .fu3{animation-delay:.18s}.fu4{animation-delay:.24s}\n}\n\n/* ── Footer ── */\n.site-footer{\n  border-top:1px solid var(--line-1);\n  padding:20px 32px;\n  display:flex;justify-content:space-between;\n  color:var(--tx-4);\n  font-size:12px;\n  font-family:var(--ff-mono);\n}\n\n/* ══════════════════════════════════\n   CITY PICKER\n══════════════════════════════════ */\n.city-wrap{position:relative}\n\n.hdr-city{\n  display:flex;align-items:center;gap:8px;\n  padding:5px 8px;margin-left:-8px;\n  border-radius:var(--r-sm);\n  cursor:pointer;\n  user-select:none;\n  transition:background .15s;\n}\n.hdr-city:hover{background:var(--bg-2)}\n.hdr-city .dot{\n  width:7px;height:7px;border-radius:50%;\n  background:var(--ac);\n  box-shadow:0 0 0 3px var(--ac-soft);\n  flex-shrink:0;\n}\n.hdr-city .name{font-size:15px;font-weight:600;letter-spacing:-.01em}\n.city-chevron{color:var(--tx-4);transition:transform .2s;flex-shrink:0}\n.city-wrap.open .city-chevron{transform:rotate(180deg)}\n\n/* Dropdown panel */\n.city-picker{\n  position:absolute;top:calc(100% + 20px);left:0;\n  width:310px;\n  background:var(--bg-3);\n  border:1px solid var(--line-2);\n  border-radius:var(--r-md);\n  box-shadow:0 8px 32px rgba(0,0,0,.55);\n  display:none;z-index:300;\n  overflow:hidden;\n}\n.city-wrap.open .city-picker{display:block}\n\n/* Search row */\n.cp-search{\n  display:flex;align-items:center;gap:8px;\n  padding:10px 14px;\n  border-bottom:1px solid var(--line-1);\n}\n.cp-search svg{flex-shrink:0;opacity:.45;color:var(--tx-3)}\n.cp-search input{\n  flex:1;background:transparent;border:none;outline:none;\n  color:var(--tx-1);font:14px var(--ff-sans);min-width:0;\n}\n.cp-search input::placeholder{color:var(--tx-4)}\n\n/* Preset chips */\n.cp-section-label{\n  padding:8px 14px 3px;\n  font-size:10px;letter-spacing:.1em;text-transform:uppercase;\n  color:var(--tx-4);font-weight:500;\n}\n.cp-presets{display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 10px;border-bottom:1px solid var(--line-1)}\n.cp-preset{\n  background:var(--bg-2);border:1px solid var(--line-2);\n  color:var(--tx-3);padding:3px 9px;\n  border-radius:var(--r-pill);font:500 11px var(--ff-sans);\n  cursor:pointer;transition:color .12s,border-color .12s,background .12s;\n}\n.cp-preset:hover{color:var(--tx-1);border-color:var(--ac-line);background:var(--bg-3)}\n.cp-preset:active{opacity:.7;transform:scale(.97)}\n.cp-preset.active{color:var(--ac);border-color:var(--ac-line);background:var(--ac-soft)}\n\n/* Results */\n.cp-results{max-height:190px;overflow-y:auto}\n.cp-item{\n  display:block;width:100%;text-align:left;\n  padding:9px 14px;border:none;background:transparent;\n  cursor:pointer;border-bottom:1px solid var(--line-1);\n  transition:background .1s;\n}\n.cp-item:last-child{border-bottom:none}\n.cp-item:hover{background:var(--bg-2)}\n.cp-item:active{background:var(--bg-3)}\n.cp-item .cp-name{font-size:13px;color:var(--tx-1);font-weight:500}\n.cp-item .cp-sub{font-size:11px;color:var(--tx-4);margin-top:2px;font-family:var(--ff-mono)}\n.cp-empty,.cp-loading{\n  padding:14px;font-size:12px;color:var(--tx-4);\n  text-align:center;font-family:var(--ff-mono);\n}\n/* ── Temperaturkarte ── */\n.map-section{display:flex;flex-direction:column;gap:16px}\n.map-banner{\n  background:var(--bg-1);border:1px solid var(--line-1);border-radius:var(--r-md);\n  padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\n}\n.map-banner .info .name{font-size:17px;font-weight:600;letter-spacing:-.015em;margin-bottom:3px}\n.map-banner .info .sub{font-size:12px;color:var(--tx-3);font-family:var(--ff-mono)}\n.map-stats{display:flex;gap:32px;flex-shrink:0}\n.map-stat .k{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--tx-3);font-weight:500;margin-bottom:4px}\n.map-stat .v{font-size:22px;font-weight:600;letter-spacing:-.02em}\n.map-card{\n  background:var(--bg-1);border:1px solid var(--line-1);border-radius:var(--r-md);\n  overflow:hidden;position:relative;\n}\n.map-card #map-container{width:100%;height:620px}\n.map-legend{\n  position:absolute;bottom:20px;right:20px;\n  background:rgba(11,11,13,.82);backdrop-filter:blur(8px);\n  border:1px solid var(--line-2);border-radius:var(--r-md);\n  padding:14px 16px;display:flex;flex-direction:column;gap:6px;\n  pointer-events:none;\n}\n.map-legend .leg-title{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--tx-3);font-weight:500;margin-bottom:2px}\n.map-legend .leg-bar{display:flex;align-items:center;gap:10px}\n.map-legend .leg-bar .bar{\n  width:120px;height:8px;border-radius:4px;\n  background:linear-gradient(to right,#1a3a6b,#1d4ed8,#60a5fa,#bfdbfe,#fde68a,#fb923c,#dc2626);\n}\n.map-legend .leg-bar .lbl{font:11px var(--ff-mono);color:var(--tx-4);white-space:nowrap}\n/* maplibre overrides */\n.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-bottom-right{display:none}\n.maplibregl-ctrl-top-right{top:12px;right:12px}\n.maplibregl-ctrl button{background:var(--bg-2)!important;border:1px solid var(--line-2)!important}\n.maplibregl-ctrl button .maplibregl-ctrl-icon{filter:invert(.7)}\n.maplibregl-popup-content{background:var(--bg-3)!important;border:1px solid var(--line-2)!important;border-radius:var(--r-md)!important;padding:14px 16px!important;color:var(--tx-1)!important;box-shadow:0 8px 24px rgba(0,0,0,.55)!important}\n.maplibregl-popup-close-button{color:var(--tx-3)!important;font-size:16px!important}\n.maplibregl-popup-anchor-bottom .maplibregl-popup-tip{border-top-color:var(--line-2)!important}\n\u003c/style\u003e\n\u003c/head\u003e\n\n\u003cbody\u003e\n\n\u003c!-- ═══════════════════════════════\n     HEADER\n═══════════════════════════════ --\u003e\n\u003cheader class=\"site-header\"\u003e\n  \u003cdiv class=\"hdr-inner\"\u003e\n\n    \u003c!-- City picker --\u003e\n    \u003cdiv class=\"city-wrap\" id=\"city-wrap\"\u003e\n      \u003cdiv class=\"hdr-city\" id=\"hdr-city-btn\"\u003e\n        \u003cdiv class=\"dot\"\u003e\u003c/div\u003e\n        \u003cspan class=\"name\" id=\"city-name\"\u003eWürzburg\u003c/span\u003e\n        \u003csvg class=\"city-chevron\" width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"\u003e\n          \u003cpath d=\"M2 4.5l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\u003c/path\u003e\n        \u003c/svg\u003e\n      \u003c/div\u003e\n\n      \u003c!-- Dropdown --\u003e\n      \u003cdiv class=\"city-picker\" id=\"city-picker\"\u003e\n        \u003cdiv class=\"cp-search\"\u003e\n          \u003csvg width=\"14\" height=\"14\" viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.5\" stroke-linecap=\"round\"\u003e\n            \u003ccircle cx=\"20\" cy=\"20\" r=\"12\"\u003e\u003c/circle\u003e\n            \u003cpath d=\"M30 30l9 9\"\u003e\u003c/path\u003e\n          \u003c/svg\u003e\n          \u003cinput type=\"text\" id=\"cp-input\" placeholder=\"Stadt suchen…\" autocomplete=\"off\" spellcheck=\"false\"\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"cp-section-label\"\u003eSchnellauswahl\u003c/div\u003e\n        \u003cdiv class=\"cp-presets\" id=\"cp-presets\"\u003e\u003c!-- via JS --\u003e\u003c/div\u003e\n        \u003cdiv class=\"cp-results\" id=\"cp-results\"\u003e\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- Tab nav --\u003e\n    \u003cdiv class=\"seg\"\u003e\n      \u003cbutton class=\"on\" id=\"tab-forecast\" onclick=\"switchTab(\u0027forecast\u0027)\"\u003eVorhersage\u003c/button\u003e\n      \u003cbutton id=\"tab-map\" onclick=\"switchTab(\u0027map\u0027)\"\u003eKarte\u003c/button\u003e\n      \u003cbutton id=\"tab-climate\" onclick=\"switchTab(\u0027climate\u0027)\"\u003eKlimaanalyse\u003c/button\u003e\n    \u003c/div\u003e\n\n    \u003c!-- Right: date + clock + status --\u003e\n    \u003cdiv style=\"display:flex;align-items:center;gap:14px\"\u003e\n      \u003cspan class=\"mono\" id=\"hdr-date\" style=\"color:var(--tx-3);font-size:11px\"\u003e\u003c/span\u003e\n      \u003cspan class=\"mono\" id=\"hdr-clock\" style=\"color:var(--tx-4)\"\u003e\u003c/span\u003e\n      \u003cspan class=\"chip\" id=\"status-chip\"\u003e● Verbinde…\u003c/span\u003e\n    \u003c/div\u003e\n\n  \u003c/div\u003e\n\u003c/header\u003e\n\n\n\u003c!-- ═══════════════════════════════\n     MAIN\n═══════════════════════════════ --\u003e\n\u003cmain class=\"main-wrap\"\u003e\n\n\n  \u003c!-- ══ FORECAST ══ --\u003e\n  \u003csection id=\"section-forecast\" class=\"section active\"\u003e\n    \u003cdiv class=\"forecast-grid\"\u003e\n\n      \u003c!-- ── LEFT COLUMN ── --\u003e\n      \u003cdiv class=\"forecast-left\"\u003e\n\n        \u003c!-- Hero card --\u003e\n        \u003cdiv class=\"wcard fu\"\u003e\n          \u003cdiv class=\"wcard-top\"\u003e\n            \u003cspan id=\"wcard-day\" class=\"mono\"\u003e—\u003c/span\u003e\n            \u003cspan class=\"mono\" id=\"wcard-time\"\u003e—\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"wcard-main\"\u003e\n            \u003cdiv\u003e\n              \u003cdiv class=\"wcard-temp\"\u003e\n                \u003cspan id=\"hero-temp\"\u003e--\u003c/span\u003e\u003cspan class=\"deg\"\u003e°C\u003c/span\u003e\n              \u003c/div\u003e\n              \u003cdiv class=\"wcard-desc\" id=\"hero-desc\"\u003eLade Daten…\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv id=\"hero-icon\" style=\"margin-top:4px\"\u003e\n              \u003c!-- injected by JS --\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"wcard-stats\"\u003e\n            \u003cdiv class=\"row\"\u003e\u003cspan class=\"k\"\u003eMax\u003c/span\u003e\u003cspan class=\"v\" id=\"h-max\"\u003e--°\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"row\"\u003e\u003cspan class=\"k\"\u003eWind\u003c/span\u003e\u003cspan class=\"v\" id=\"h-wind\"\u003e-- km/h\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"row\"\u003e\u003cspan class=\"k\"\u003eMin\u003c/span\u003e\u003cspan class=\"v\" id=\"h-min\"\u003e--°\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"row\"\u003e\u003cspan class=\"k\"\u003eDruck\u003c/span\u003e\u003cspan class=\"v\" id=\"h-press\"\u003e-- hPa\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"row\"\u003e\u003cspan class=\"k\"\u003eNiederschlag\u003c/span\u003e\u003cspan class=\"v\" id=\"h-precip\"\u003e-- mm\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"row\"\u003e\u003cspan class=\"k\"\u003eFeuchte\u003c/span\u003e\u003cspan class=\"v\" id=\"h-hum\"\u003e-- %\u003c/span\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003c!-- 7-day strip --\u003e\n        \u003cdiv class=\"day-strip-wrap fu fu1\"\u003e\n          \u003cdiv class=\"day-strip-label\"\u003e\n            \u003cspan class=\"label\"\u003e7-Tage Vorschau\u003c/span\u003e\n            \u003cspan class=\"mono\" style=\"color:var(--tx-4)\"\u003eDWD MOSMIX\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"day-strip\" id=\"forecast-strip\"\u003e\n            \u003c!-- 7 skeleton cards --\u003e\n            \u003cdiv class=\"skeleton\" style=\"height:132px\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"skeleton\" style=\"height:132px\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"skeleton\" style=\"height:132px\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"skeleton\" style=\"height:132px\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"skeleton\" style=\"height:132px\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"skeleton\" style=\"height:132px\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"skeleton\" style=\"height:132px\"\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003c!-- Metrics label --\u003e\n        \u003cdiv class=\"section-label fu fu2\"\u003e\n          \u003cspan class=\"label\"\u003eHeute — Übersicht\u003c/span\u003e\n          \u003cdiv class=\"line\"\u003e\u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003c!-- 2×2 metric cards --\u003e\n        \u003cdiv class=\"metric-grid fu fu2\"\u003e\n\n          \u003c!-- Wind --\u003e\n          \u003cdiv class=\"metric\"\u003e\n            \u003cdiv class=\"head\"\u003e\n              \u003cspan class=\"t\"\u003eWindgeschwindigkeit\u003c/span\u003e\n              \u003cspan class=\"sub\" id=\"m-time\"\u003e—\u003c/span\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"bars\" id=\"wind-bars\"\u003e\n              \u003c!-- injected by JS --\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"foot\"\u003e\n              \u003cspan style=\"color:var(--tx-1);font-size:14px;font-weight:600;\" id=\"m-wind-val\"\u003e--\u003c/span\u003e\n              \u003cspan id=\"m-wind-dir\"\u003e-- · Böen --\u003c/span\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n\n          \u003c!-- Humidity --\u003e\n          \u003cdiv class=\"metric\"\u003e\n            \u003cdiv class=\"head\"\u003e\n              \u003cspan class=\"t\"\u003eLuftfeuchtigkeit\u003c/span\u003e\n              \u003cspan class=\"sub\"\u003eaktuell\u003c/span\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"display:flex;justify-content:space-between;align-items:center;margin-top:6px\"\u003e\n              \u003cdiv class=\"v\" id=\"m-hum-val\"\u003e--\u003cspan class=\"u\"\u003e%\u003c/span\u003e\u003c/div\u003e\n              \u003csvg width=\"44\" height=\"44\" viewBox=\"0 0 48 48\"\u003e\n                \u003cpath class=\"ic-bg\" d=\"M34 24c0 6-4 11-9 11s-9-5-9-11c0-5 4-11 9-17 5 6 9 12 9 17Z\"\u003e\u003c/path\u003e\n                \u003cpath class=\"ic-fg\" d=\"M27 24c0 4-1 7-3 7\" stroke=\"var(--ic-fg)\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\" opacity=\".5\"\u003e\u003c/path\u003e\n              \u003c/svg\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"foot\"\u003e\n              \u003cspan id=\"m-dewpoint\"\u003eTaupunkt: --°\u003c/span\u003e\n              \u003cspan id=\"m-hum-sub\"\u003e—\u003c/span\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n\n          \u003c!-- Pressure --\u003e\n          \u003cdiv class=\"metric\"\u003e\n            \u003cdiv class=\"head\"\u003e\n              \u003cspan class=\"t\"\u003eLuftdruck\u003c/span\u003e\n              \u003cspan class=\"sub\"\u003eMeereshöhe\u003c/span\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"margin-top:6px\"\u003e\n              \u003cdiv class=\"v\" id=\"m-press-val\"\u003e--\u003cspan class=\"u\"\u003ehPa\u003c/span\u003e\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"foot\"\u003e\n              \u003cspan id=\"m-press-sub\"\u003eNormaldruck: 1013 hPa\u003c/span\u003e\n              \u003csvg width=\"16\" height=\"16\" viewBox
